services:
  a2a-server:
    build:
      context: .
    image: oci-langgraph-a2a-blueprint:local
    ports:
      - "${A2A_SERVER_PORT:-8080}:8080"
    environment:
      A2A_SERVER_HOST: "0.0.0.0"
      A2A_SERVER_PORT: "8080"
      A2A_SERVER_PUBLIC_URL: "${A2A_SERVER_PUBLIC_URL:-http://localhost:8080}"
      AGENT_LOG_LEVEL: "${AGENT_LOG_LEVEL:-INFO}"
      AGENT_STEP_SLEEP_SECONDS: "${AGENT_STEP_SLEEP_SECONDS:-0}"
      AGENT_LLM_MODEL_ID: "${AGENT_LLM_MODEL_ID:-openai.gpt5.5}"
      AGENT_LLM_API_KEY: "${AGENT_LLM_API_KEY:-}"
      AGENT_LLM_OCI_REGION: "${AGENT_LLM_OCI_REGION:-us-chicago-1}"
      AGENT_LLM_BASE_URL: "${AGENT_LLM_BASE_URL:-}"
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://localhost:8080/.well-known/agent-card.json', timeout=2).read()"
      interval: 10s
      timeout: 3s
      retries: 6
      start_period: 5s
