<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="820" viewBox="0 0 1280 820" role="img" aria-labelledby="title desc">
  <title id="title">OCI LangGraph A2A Blueprint Architecture</title>
  <desc id="desc">Architecture diagram showing clients, deployment entry points, reusable A2A framework components, replaceable agent components, and the A2A streaming response flow.</desc>
  <defs>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2563eb"/>
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#15803d"/>
    </marker>
    <marker id="arrow-slate" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
    </marker>
    <style>
      .page {
        fill: #f8fafc;
      }
      .title {
        fill: #0f172a;
        font-family: Arial, Helvetica, sans-serif;
        font-size: 30px;
        font-weight: 700;
      }
      .subtitle {
        fill: #475569;
        font-family: Arial, Helvetica, sans-serif;
        font-size: 15px;
      }
      .zone {
        stroke-width: 2;
        rx: 16;
        ry: 16;
      }
      .zone-title {
        fill: #0f172a;
        font-family: Arial, Helvetica, sans-serif;
        font-size: 18px;
        font-weight: 700;
      }
      .zone-note {
        fill: #475569;
        font-family: Arial, Helvetica, sans-serif;
        font-size: 12px;
      }
      .box {
        fill: #ffffff;
        stroke: #cbd5e1;
        stroke-width: 1.5;
        rx: 10;
        ry: 10;
      }
      .box-title {
        fill: #111827;
        font-family: Arial, Helvetica, sans-serif;
        font-size: 15px;
        font-weight: 700;
      }
      .box-text {
        fill: #475569;
        font-family: Arial, Helvetica, sans-serif;
        font-size: 12px;
      }
      .code {
        fill: #334155;
        font-family: "SFMono-Regular", Consolas, "Liberation Mono", monospace;
        font-size: 11px;
      }
      .label {
        fill: #334155;
        font-family: Arial, Helvetica, sans-serif;
        font-size: 12px;
        font-weight: 700;
      }
      .arrow-blue {
        fill: none;
        stroke: #2563eb;
        stroke-width: 2.5;
        marker-end: url(#arrow-blue);
      }
      .arrow-green {
        fill: none;
        stroke: #15803d;
        stroke-width: 2.5;
        marker-end: url(#arrow-green);
      }
      .arrow-slate {
        fill: none;
        stroke: #475569;
        stroke-width: 2.2;
        marker-end: url(#arrow-slate);
      }
      .arrow-dashed {
        stroke-dasharray: 7 6;
      }
      .pill {
        rx: 999;
        ry: 999;
      }
      .pill-text {
        fill: #0f172a;
        font-family: Arial, Helvetica, sans-serif;
        font-size: 12px;
        font-weight: 700;
      }
    </style>
  </defs>

  <rect class="page" width="1280" height="820"/>

  <text class="title" x="50" y="54">OCI LangGraph A2A Blueprint Architecture</text>
  <text class="subtitle" x="50" y="82">Reusable A2A framework wrapping a replaceable LangGraph agent behind a stable streaming protocol boundary.</text>

  <rect class="pill" x="980" y="42" width="230" height="34" fill="#dcfce7" stroke="#86efac"/>
  <text class="pill-text" x="1000" y="64">A2A 1.0 HTTP+JSON/SSE</text>

  <rect class="zone" x="50" y="130" width="240" height="250" fill="#eff6ff" stroke="#93c5fd"/>
  <text class="zone-title" x="72" y="162">Clients</text>
  <text class="zone-note" x="72" y="184">Call the public A2A boundary</text>

  <rect class="box" x="75" y="210" width="190" height="58"/>
  <text class="box-title" x="95" y="234">A2A Stream Client</text>
  <text class="code" x="95" y="254">a2a-stream-client</text>

  <rect class="box" x="75" y="295" width="190" height="58"/>
  <text class="box-title" x="95" y="319">Raw A2A Caller</text>
  <text class="code" x="95" y="339">POST /message:stream</text>

  <rect class="zone" x="50" y="440" width="240" height="190" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text class="zone-title" x="72" y="472">Local Deployment</text>
  <text class="zone-note" x="72" y="494">One container for server + agent</text>

  <rect class="box" x="75" y="520" width="190" height="58"/>
  <text class="box-title" x="95" y="544">Docker Compose</text>
  <text class="code" x="95" y="564">./start_server.sh</text>

  <rect class="zone" x="370" y="120" width="390" height="560" fill="#ecfeff" stroke="#67e8f9"/>
  <text class="zone-title" x="392" y="152">Reusable A2A Framework</text>
  <text class="zone-note" x="392" y="174">Do not change for normal agent replacement</text>

  <rect class="box" x="405" y="205" width="300" height="68"/>
  <text class="box-title" x="426" y="230">Server Entry Point</text>
  <text class="code" x="426" y="250">framework/a2a_server.py</text>
  <text class="box-text" x="426" y="266">Loads config and starts Starlette/Uvicorn</text>

  <rect class="box" x="405" y="310" width="300" height="68"/>
  <text class="box-title" x="426" y="335">Server Factory</text>
  <text class="code" x="426" y="355">create_server(...)</text>
  <text class="box-text" x="426" y="371">Wires A2A SDK routes and task store</text>

  <rect class="box" x="405" y="415" width="300" height="78"/>
  <text class="box-title" x="426" y="440">A2A Executor</text>
  <text class="code" x="426" y="460">framework/a2a_executor.py</text>
  <text class="box-text" x="426" y="476">Maps agent events to A2A task updates</text>

  <rect class="box" x="405" y="535" width="300" height="78"/>
  <text class="box-title" x="426" y="560">Framework Contract</text>
  <text class="code" x="426" y="580">framework/a2a_contract.py</text>
  <text class="box-text" x="426" y="596">AgentProgressEvent + AgentAdapter</text>

  <rect class="zone" x="860" y="120" width="370" height="560" fill="#f0fdf4" stroke="#86efac"/>
  <text class="zone-title" x="882" y="152">Replaceable Agent Package</text>
  <text class="zone-note" x="882" y="174">Customize these files for your LangGraph agent</text>

  <rect class="box" x="895" y="205" width="285" height="78"/>
  <text class="box-title" x="916" y="230">Agent Adapter</text>
  <text class="code" x="916" y="250">agent/agent_adapter.py</text>
  <text class="box-text" x="916" y="266">Provides factory + custom Agent Card</text>

  <rect class="box" x="895" y="325" width="285" height="78"/>
  <text class="box-title" x="916" y="350">LangGraph Agent</text>
  <text class="code" x="916" y="370">agent/agent.py</text>
  <text class="box-text" x="916" y="386">Builds graph and exposes stream()</text>

  <rect class="box" x="895" y="445" width="285" height="78"/>
  <text class="box-title" x="916" y="470">State + Steps</text>
  <text class="code" x="916" y="490">agent/state.py, agent/steps.py</text>
  <text class="box-text" x="916" y="506">Own workflow state and node behavior</text>

  <rect class="box" x="895" y="565" width="285" height="78"/>
  <text class="box-title" x="916" y="590">Agent Stream Events</text>
  <text class="code" x="916" y="610">step_completed, data, agent_completed</text>
  <text class="box-text" x="916" y="626">Emitted as AgentProgressEvent objects</text>

  <path class="arrow-blue" d="M 265 239 C 320 239, 340 239, 405 239"/>
  <text class="label" x="302" y="223">A2A request</text>

  <path class="arrow-blue" d="M 265 324 C 322 324, 340 344, 405 344"/>
  <text class="label" x="300" y="318">HTTP/SSE</text>

  <path class="arrow-slate" d="M 265 548 C 325 548, 350 239, 405 239"/>
  <text class="label" x="305" y="548">runs entry point</text>

  <path class="arrow-slate" d="M 555 273 L 555 310"/>
  <path class="arrow-slate" d="M 555 378 L 555 415"/>
  <path class="arrow-slate" d="M 555 493 L 555 535"/>

  <path class="arrow-green" d="M 705 239 C 780 239, 805 244, 895 244"/>
  <text class="label" x="744" y="222">loads adapter</text>

  <path class="arrow-green" d="M 705 454 C 790 454, 805 364, 895 364"/>
  <text class="label" x="752" y="424">calls stream()</text>

  <path class="arrow-green" d="M 1038 403 L 1038 445"/>
  <path class="arrow-green" d="M 1038 523 L 1038 565"/>

  <path class="arrow-green arrow-dashed" d="M 895 604 C 790 604, 780 454, 705 454"/>
  <text class="label" x="738" y="590">progress events</text>

  <path class="arrow-blue arrow-dashed" d="M 405 454 C 330 454, 310 365, 265 324"/>
  <text class="label" x="300" y="430">SSE task updates</text>

  <rect class="pill" x="402" y="710" width="215" height="34" fill="#dbeafe" stroke="#93c5fd"/>
  <text class="pill-text" x="422" y="732">Framework: stable A2A boundary</text>

  <rect class="pill" x="690" y="710" width="230" height="34" fill="#dcfce7" stroke="#86efac"/>
  <text class="pill-text" x="710" y="732">Agent: replaceable LangGraph logic</text>

  <rect class="pill" x="990" y="710" width="190" height="34" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text class="pill-text" x="1010" y="732">Docker: local packaging</text>
</svg>
